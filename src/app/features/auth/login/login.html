<main class="auth-page">
  <section class="auth-panel">
    <div class="auth-art">
      <img
        src="https://i.imgur.com/QkIa5tT.jpeg"
        alt="Coleção de produtos da loja"
        loading="eager"
      />
      <div class="auth-art-copy">
        <span>Platzi Fake Store API</span>
        <h1>Gestão de catálogo com acesso protegido.</h1>
      </div>
    </div>

    <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
      <div class="eyebrow">Autenticação JWT</div>
      <h2>Entrar no painel</h2>
      <p>Use sua sessão para acessar produtos, categorias e protótipos de cadastro.</p>

      @if (errorMessage()) {
        <div class="alert alert-error">{{ errorMessage() }}</div>
      }

      <label class="field">
        <span>E-mail</span>
        <input type="email" formControlName="email" autocomplete="email" />
        @if (email.invalid && (email.dirty || email.touched)) {
          <small>Informe um e-mail válido.</small>
        }
      </label>

      <label class="field">
        <span>Senha</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
        @if (password.invalid && (password.dirty || password.touched)) {
          <small>Informe a senha.</small>
        }
      </label>

      <button class="button button-primary button-block" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="demo-credentials">
        <span>Credenciais demo</span>
        <strong>john@mail.com</strong>
        <strong>changeme</strong>
      </div>
    </form>
  </section>
</main>
